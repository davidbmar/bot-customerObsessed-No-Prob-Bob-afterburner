<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Discovery Agent</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --user-bg: #1f6feb22;
    --bot-bg: #161b22;
    --success: #3fb950;
    --warning: #d29922;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 16px;
    font-weight: 600;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .btn-small {
    background: var(--bg-tertiary);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }

  .btn-small:hover { color: var(--text); border-color: var(--accent); }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .status-dot.ok { background: var(--success); }
  .status-dot.error { background: #f85149; }
  .status-dot.loading { background: var(--warning); }

  /* Main layout */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .message {
    max-width: 75%;
    margin-bottom: 16px;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
  }

  .message.user {
    margin-left: auto;
    background: var(--user-bg);
    border: 1px solid var(--accent-dim);
  }

  .message.assistant {
    margin-right: auto;
    background: var(--bot-bg);
    border: 1px solid var(--border);
  }

  .message .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Input */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
    display: flex;
    gap: 10px;
  }

  .input-area textarea {
    flex: 1;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 42px;
    max-height: 120px;
  }

  .input-area textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .input-area button {
    background: var(--accent-dim);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }

  .input-area button:hover { background: var(--accent); }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Debug panel */
  .debug-panel {
    width: 300px;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    font-size: 12px;
    transition: width 0.2s, padding 0.2s;
  }

  .debug-panel.collapsed {
    width: 0;
    padding: 0;
    overflow: hidden;
    border-left: none;
  }

  .debug-panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .debug-panel h3:first-child { margin-top: 0; }

  .debug-value {
    color: var(--text);
    padding: 4px 8px;
    background: var(--bg-tertiary);
    border-radius: 4px;
    margin-bottom: 4px;
    font-family: 'SF Mono', Menlo, monospace;
  }

  .debug-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    margin: 2px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
  }

  .typing {
    color: var(--text-muted);
    font-style: italic;
    padding: 10px 14px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Customer Discovery Agent</h1>
  <div class="header-actions">
    <button class="btn-small" onclick="newConversation()" title="Start a new conversation">New Chat</button>
    <button class="btn-small" id="debugToggle" onclick="toggleDebug()" title="Toggle debug panel">Debug</button>
    <div class="header-meta">
      <span class="status-dot loading" id="statusDot"></span>
      <span id="modelInfo">connecting...</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Type a message..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="debug-panel" id="debugPanel">
    <h3>Status</h3>
    <div class="debug-value" id="debugStatus">Connecting...</div>

    <h3>Principles Active</h3>
    <div id="debugPrinciples">&mdash;</div>

    <h3>Tools Called</h3>
    <div class="debug-value" id="debugTools">none</div>

    <h3>Memory</h3>
    <div class="debug-value" id="debugMemory">0 messages</div>

    <h3>Tokens</h3>
    <div class="debug-value" id="debugTokens">&mdash;</div>

    <h3>Latency</h3>
    <div class="debug-value" id="debugLatency">&mdash;</div>

    <h3>Conversation</h3>
    <div class="debug-value" id="debugConvId">&mdash;</div>
  </div>
</div>

<script>
var API = '';  // same origin
var conversationId = 'web-' + Date.now().toString(36);

function init() {
  document.getElementById('debugConvId').textContent = conversationId;
  fetch(API + '/api/health')
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      var dot = document.getElementById('statusDot');
      dot.className = 'status-dot ' + (data.ollama === 'ok' ? 'ok' : 'error');
      document.getElementById('modelInfo').textContent = data.model + ' \u00b7 ' + data.personality;
      document.getElementById('debugStatus').textContent = 'Ollama: ' + data.ollama;

      return fetch(API + '/api/personality');
    })
    .then(function(resp) { return resp.json(); })
    .then(function(pData) {
      var el = document.getElementById('debugPrinciples');
      el.textContent = '';
      pData.principles.forEach(function(p) {
        var tag = document.createElement('span');
        tag.className = 'debug-tag';
        tag.textContent = p;
        el.appendChild(tag);
      });
    })
    .catch(function(e) {
      document.getElementById('statusDot').className = 'status-dot error';
      document.getElementById('modelInfo').textContent = 'disconnected';
      document.getElementById('debugStatus').textContent = 'Error: ' + e.message;
    });
}

function newConversation() {
  conversationId = 'web-' + Date.now().toString(36);
  document.getElementById('messages').textContent = '';
  document.getElementById('debugConvId').textContent = conversationId;
  document.getElementById('debugMemory').textContent = '0 messages';
  document.getElementById('debugTools').textContent = 'none';
  document.getElementById('debugTokens').textContent = '\u2014';
  document.getElementById('debugLatency').textContent = '\u2014';
  document.getElementById('input').focus();
}

function toggleDebug() {
  var panel = document.getElementById('debugPanel');
  panel.classList.toggle('collapsed');
}

function addMessage(role, text) {
  var el = document.createElement('div');
  el.className = 'message ' + role;

  var label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'You' : 'Bot';
  el.appendChild(label);

  var body = document.createElement('div');
  body.textContent = text;
  el.appendChild(body);

  var container = document.getElementById('messages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);

  var btn = document.getElementById('sendBtn');
  btn.disabled = true;

  // Show typing indicator
  var typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'Thinking...';
  typing.id = 'typing';
  var container = document.getElementById('messages');
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;

  fetch(API + '/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text, conversation_id: conversationId})
  })
  .then(function(resp) { return resp.json(); })
  .then(function(data) {
    var typingEl = document.getElementById('typing');
    if (typingEl) typingEl.remove();

    if (data.error) {
      addMessage('assistant', 'Error: ' + data.error);
    } else {
      addMessage('assistant', data.response);

      // Update debug panel
      document.getElementById('debugTools').textContent =
        data.tools_called && data.tools_called.length > 0
          ? data.tools_called.map(function(t) { return t.name; }).join(', ')
          : 'none called';
      document.getElementById('debugMemory').textContent = data.memory_count + ' messages';
      document.getElementById('debugTokens').textContent =
        data.input_tokens + ' in / ' + data.output_tokens + ' out';
      document.getElementById('debugLatency').textContent =
        (data.duration_ms / 1000).toFixed(1) + 's (' + data.duration_ms + 'ms)';
    }
  })
  .catch(function(e) {
    var typingEl = document.getElementById('typing');
    if (typingEl) typingEl.remove();
    addMessage('assistant', 'Connection error: ' + e.message);
  })
  .finally(function() {
    btn.disabled = false;
    input.focus();
  });
}

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

init();
</script>
</body>
</html>
