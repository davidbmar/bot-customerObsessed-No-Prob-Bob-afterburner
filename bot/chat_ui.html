<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Discovery Agent</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --user-bg: #1f6feb22;
    --bot-bg: #161b22;
    --success: #3fb950;
    --warning: #d29922;
    --error: #f85149;
  }

  html.light {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --bg-tertiary: #e9ecef;
    --border: #d0d7de;
    --text: #1f2328;
    --text-muted: #656d76;
    --accent: #0969da;
    --accent-dim: #0550ae;
    --user-bg: #ddf4ff;
    --bot-bg: #f6f8fa;
    --success: #1a7f37;
    --warning: #9a6700;
    --error: #cf222e;
  }

  /* Detect system light preference when no localStorage override */
  @media (prefers-color-scheme: light) {
    html:not(.light):not(.dark) {
      --bg: #ffffff;
      --bg-secondary: #f6f8fa;
      --bg-tertiary: #e9ecef;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --accent-dim: #0550ae;
      --user-bg: #ddf4ff;
      --bot-bg: #f6f8fa;
      --success: #1a7f37;
      --warning: #9a6700;
      --error: #cf222e;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header h1 { font-size: 16px; font-weight: 600; }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .btn-small {
    background: var(--bg-tertiary);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }

  .btn-small:hover { color: var(--text); border-color: var(--accent); }
  .btn-small.active { color: var(--accent); border-color: var(--accent); }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .status-dot.ok { background: var(--success); }
  .status-dot.error { background: var(--error); }
  .status-dot.loading { background: var(--warning); }

  /* Conversation sidebar — hidden by default via CSS, toggled by JS */
  .conv-sidebar {
    display: none;
    width: 250px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    transition: width 0.2s, padding 0.2s;
  }

  .conv-sidebar.open {
    display: flex;
  }

  .conv-sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .conv-sidebar-header h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0;
  }

  .btn-new-chat {
    background: var(--accent-dim);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    white-space: nowrap;
  }

  .btn-new-chat:hover { background: var(--accent); }

  .conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .conv-search {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .conv-search input {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 12px;
    font-family: inherit;
  }

  .conv-search input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .conv-search input::placeholder { color: var(--text-muted); }

  .conv-item {
    display: flex;
    align-items: flex-start;
    width: 100%;
    background: none;
    border: none;
    border-left: 3px solid transparent;
    padding: 10px 12px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    transition: background 0.1s;
    position: relative;
  }

  .conv-item:hover { background: var(--bg-tertiary); }

  .conv-item-content { flex: 1; min-width: 0; }

  .conv-item-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
    margin-left: 4px;
  }

  .conv-item:hover .conv-item-delete { opacity: 1; }
  .conv-item-delete:hover { color: var(--error); }

  mark.search-highlight {
    background: var(--warning);
    color: var(--bg);
    border-radius: 2px;
    padding: 0 1px;
  }

  .conv-item.active {
    background: var(--bg-tertiary);
    border-left-color: var(--accent);
  }

  .conv-item-preview {
    font-size: 13px;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }

  .conv-item-preview[contenteditable="true"] {
    outline: 1px solid var(--accent);
    border-radius: 3px;
    padding: 1px 4px;
    background: var(--bg-tertiary);
    cursor: text;
    white-space: nowrap;
    overflow: hidden;
  }

  .conv-item-meta {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* Main layout */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .message-group {
    margin-bottom: 20px;
  }

  .message {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
  }

  .message.user {
    margin-left: auto;
    background: var(--user-bg);
    border: 1px solid var(--accent-dim);
  }

  .message.assistant {
    margin-right: auto;
    background: var(--bot-bg);
    border: 1px solid var(--border);
  }

  .message.error {
    margin-right: auto;
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid var(--error);
    color: var(--error);
  }

  .btn-retry {
    background: var(--bg-tertiary);
    color: var(--error);
    border: 1px solid var(--error);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    margin-top: 8px;
    font-family: inherit;
  }

  .btn-retry:hover { background: rgba(248, 81, 73, 0.15); }

  .message .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .message .timestamp {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }

  .message.user .body { white-space: pre-wrap; }
  .message.assistant .body h1,
  .message.assistant .body h2,
  .message.assistant .body h3,
  .message.assistant .body h4,
  .message.assistant .body h5,
  .message.assistant .body h6 {
    margin: 12px 0 6px 0;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .message.assistant .body h1 { font-size: 1.3em; }
  .message.assistant .body h2 { font-size: 1.15em; }
  .message.assistant .body h3 { font-size: 1.05em; }
  .message .body p { margin-bottom: 8px; }
  .message .body p:last-child { margin-bottom: 0; }
  .message .body strong { font-weight: 600; color: var(--text); }
  .message .body code {
    background: var(--bg-tertiary);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 13px;
  }
  .message .body pre {
    background: var(--bg-tertiary);
    padding: 10px 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 13px;
    white-space: pre;
    line-height: 1.4;
  }
  .message .body pre code {
    background: none;
    padding: 0;
    border-radius: 0;
  }
  .message .body ul, .message .body ol {
    margin: 6px 0;
    padding-left: 20px;
  }
  .message .body li { margin-bottom: 4px; }

  /* Date separator between message groups */
  .date-separator {
    text-align: center;
    color: #888;
    font-size: 0.8em;
    margin: 1em 0;
    position: relative;
  }
  .date-separator::before,
  .date-separator::after {
    content: '';
    display: inline-block;
    width: 60px;
    height: 1px;
    background: var(--border);
    vertical-align: middle;
    margin: 0 10px;
  }

  /* Per-message debug section */
  .msg-debug {
    max-width: 75%;
    margin-right: auto;
    margin-top: 6px;
    font-size: 11px;
    font-family: 'SF Mono', Menlo, monospace;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .msg-debug.hidden { display: none; }

  .msg-debug-toggle {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'SF Mono', Menlo, monospace;
    padding: 6px 10px;
    cursor: pointer;
    text-align: left;
  }

  .msg-debug-toggle:hover { color: var(--accent); }

  .msg-debug-body {
    display: none;
    padding: 8px 10px;
    border-top: 1px solid var(--border);
  }

  .msg-debug-body.open { display: block; }

  .msg-debug-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }

  .msg-debug-row .key { color: var(--text-muted); }
  .msg-debug-row .val { color: var(--text); text-align: right; }

  .debug-pill {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
    margin: 1px 2px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--accent);
  }

  .debug-tool-name {
    color: var(--warning);
    font-weight: 600;
  }

  .debug-tool-args {
    color: var(--text-muted);
    font-size: 10px;
    display: block;
    margin-top: 2px;
  }

  /* Input */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .input-area textarea {
    flex: 1;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 42px;
    max-height: 120px;
  }

  .input-area textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .input-area button {
    background: var(--accent-dim);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }

  .input-area button:hover { background: var(--accent); }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .typing-indicator .dots {
    display: flex;
    gap: 3px;
  }

  .typing-indicator .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typing-bounce 1.4s infinite ease-in-out;
  }

  .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-4px); opacity: 1; }
  }

  /* Inline typing dots inside bot message bubble while streaming */
  .typing-dots-inline {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
  }

  .typing-dots-inline .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: pulse 1.4s infinite ease-in-out;
  }

  .typing-dots-inline .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots-inline .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; }
    40% { opacity: 1; }
  }

  /* Debug sidebar panel — hidden by default via CSS, toggled by JS */
  .debug-panel {
    display: none;
    width: 300px;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    font-size: 12px;
    transition: width 0.2s, padding 0.2s;
    flex-shrink: 0;
  }

  .debug-panel.visible {
    display: block;
  }

  .debug-panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .debug-panel h3:first-child { margin-top: 0; }

  .debug-value {
    color: var(--text);
    padding: 4px 8px;
    background: var(--bg-tertiary);
    border-radius: 4px;
    margin-bottom: 4px;
    font-family: 'SF Mono', Menlo, monospace;
  }

  .debug-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    margin: 2px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
  }

  /* Settings panel (slide-out overlay) */
  .settings-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
  }

  .settings-overlay.open { display: flex; justify-content: flex-end; }

  .settings-panel {
    width: 360px;
    max-width: 90vw;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: slide-in 0.2s ease-out;
  }

  @keyframes slide-in {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  .settings-panel h2 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .settings-panel .close-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
  }

  .settings-panel .close-btn:hover { color: var(--text); }

  .settings-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .settings-group label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .settings-group select,
  .settings-group input[type="text"] {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    font-family: inherit;
  }

  .settings-group select:focus,
  .settings-group input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .settings-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn-settings {
    background: var(--bg-tertiary);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  .btn-settings:hover { border-color: var(--accent); color: var(--accent); }

  .btn-settings.primary {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
    color: white;
  }

  .btn-settings.primary:hover { background: var(--accent); }

  .btn-settings.danger { color: var(--error); }
  .btn-settings.danger:hover { border-color: var(--error); }

  .settings-group input[type="password"] {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    font-family: inherit;
  }

  .settings-group input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .provider-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .provider-card {
    background: var(--bg-tertiary);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s;
  }

  .provider-card:hover { border-color: var(--accent-dim); }
  .provider-card.selected { border-color: var(--accent); background: var(--user-bg); }

  .provider-card .provider-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .provider-card .provider-icon {
    font-size: 20px;
    margin-bottom: 4px;
  }

  .provider-key-row { display: none; }
  .provider-key-row.visible { display: flex; }

  .test-result {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    margin-top: 4px;
  }

  .test-result.ok { color: var(--success); background: rgba(63,185,80,0.1); }
  .test-result.fail { color: var(--error); background: rgba(248,81,73,0.1); }

  .conv-id-display {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    padding: 6px 10px;
    border-radius: 4px;
    word-break: break-all;
  }

  /* Save as Seed Doc button */
  .seed-doc-bar {
    display: none;
    padding: 8px 20px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .seed-doc-bar.visible { display: flex; align-items: center; gap: 10px; }

  .btn-seed {
    background: var(--bg-tertiary);
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    white-space: nowrap;
  }

  .btn-seed:hover { background: var(--accent-dim); color: white; }
  .btn-seed:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-seed.saved { color: var(--success); border-color: var(--success); }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-tertiary);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--error); color: var(--error); }

  /* Mobile debug toggle button (visible only on mobile) */
  .btn-debug-mobile {
    display: none;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .message { max-width: 95%; }
    .msg-debug { max-width: 95%; }

    /* Sidebar: hidden by default, full-screen overlay when open */
    .conv-sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      z-index: 160;
      border-right: 1px solid var(--border);
    }
    .conv-sidebar.open { display: none; }
    .conv-sidebar.mobile-open {
      display: flex;
    }

    .conv-sidebar-backdrop {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;

<script>
var API = '';
var conversationId = 'web-' + Date.now().toString(36);
var debugVisible = false;
var llmProviders = {};
var selectedProvider = '';

var PROVIDER_ICONS = {
  'qwen-3.5': '\uD83E\uDD16',
  'ollama-other': '\uD83E\uDD99',
  'claude-haiku': '\u26A1',
  'claude-sonnet': '\uD83C\uDFB5',
  'claude-opus': '\uD83C\uDFAD',
  'chatgpt': '\uD83D\uDCAC'
};

// Token pricing per 1M tokens
var TOKEN_PRICES = {
  'claude-haiku':  { input: 0.25,  output: 1.25 },
  'claude-sonnet': { input: 3.00,  output: 15.00 },
  'claude-opus':   { input: 15.00, output: 75.00 },
  'chatgpt':       { input: 2.50,  output: 10.00 }
};

var sessionCost = 0;

function calculateCost(providerId, inputTokens, outputTokens) {
  var prices = TOKEN_PRICES[providerId];
  if (!prices) return null;  // free provider
  return (inputTokens * prices.input + outputTokens * prices.output) / 1000000;
}

function formatCost(cost) {
  if (cost === null) return 'free';
  if (cost < 0.0001) return '<$0.0001';
  return '$' + cost.toFixed(4);
}

function init() {
  document.getElementById('debugConvId').textContent = conversationId;
  document.getElementById('settingsConvId').textContent = conversationId;

  fetch(API + '/api/health')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var dot = document.getElementById('statusDot');
      var isOk = data.status === 'ok' || data.ollama === 'ok';
      dot.className = 'status-dot ' + (isOk ? 'ok' : 'error');
      var provLabel = data.provider_label || data.provider || 'ollama';
      document.getElementById('modelInfo').textContent = provLabel + ' \u00b7 ' + data.model + ' \u00b7 ' + data.personality;
      document.getElementById('debugStatus').textContent = 'LLM: ' + (isOk ? 'ok' : 'unavailable');
      document.getElementById('debugPersonality').textContent = data.personality;
    })
    .catch(function(e) {
      document.getElementById('statusDot').className = 'status-dot error';
      document.getElementById('modelInfo').textContent = 'disconnected';
      document.getElementById('debugStatus').textContent = 'Error: ' + e.message;
    });

  // Load LLM providers
  fetch(API + '/api/llm/providers')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      llmProviders = data.providers || {};
      selectedProvider = data.active_provider || '';
    })
    .catch(function() {});

  // Load personalities list
  fetch(API + '/api/personalities')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var sel = document.getElementById('settingsPersonality');
      while (sel.firstChild) sel.removeChild(sel.firstChild);
      (data.personalities || []).forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        sel.appendChild(opt);
      });
      return fetch(API + '/api/config');
    })
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
      document.getElementById('settingsPersonality').value = cfg.personality || '';
    })
    .catch(function() {});

  // Restore debug panel preference from localStorage (default: hidden)
  var savedDebug = localStorage.getItem('debugPanelVisible');
  if (savedDebug === 'true') {
    debugVisible = true;
    document.getElementById('debugToggle').classList.add('active');
    document.getElementById('debugPanel').classList.add('visible');
  }

  // Restore sidebar preference from localStorage (default: collapsed)
  var savedSidebar = localStorage.getItem('sidebarOpen');
  if (savedSidebar === 'true') {
    sidebarOpen = true;
    document.getElementById('convSidebar').classList.add('open');
    document.getElementById('sidebarToggle').classList.add('active');
    refreshConversationList();
  }

  // Try to restore conversation from localStorage
  if (!restoreConversation()) {
    showWelcomeMessage();
  }
  // Auto-scroll to bottom after restoring conversation
  var msgContainer = document.getElementById('messages');
  msgContainer.scrollTop = msgContainer.scrollHeight;
  updateSeedButtonVisibility();
  document.getElementById('input').focus();
}

function showWelcomeMessage() {
  addMessage('assistant', "Hi! I'm the Customer Discovery Agent. Tell me about what you're building or a problem you're trying to solve, and I'll help you understand it deeply.");
}

function formatTime(date) {
  var h = date.getHours();
  var m = date.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
}

/* Date grouping helpers */
var lastMessageDateStr = null;

function formatDateLabel(date) {
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var msgDay = new Date(date);
  msgDay.setHours(0, 0, 0, 0);

  var diff = today.getTime() - msgDay.getTime();
  var dayMs = 86400000;

  if (diff === 0) return 'Today';
  if (diff === dayMs) return 'Yesterday';

  var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return days[msgDay.getDay()] + ', ' + months[msgDay.getMonth()] + ' ' + msgDay.getDate();
}

function maybeAddDateSeparator(date, container) {
  var dateStr = date.toDateString();
  if (lastMessageDateStr === dateStr) return;
  lastMessageDateStr = dateStr;

  var sep = document.createElement('div');
  sep.className = 'date-separator';
  sep.textContent = formatDateLabel(date);
  container.appendChild(sep);
}

/* Safe markdown rendering using DOM methods only — no innerHTML.
   Extracts fenced code blocks first so blank lines inside them
   don't break the block-level split. */
function renderMarkdownToDOM(text, container) {
  var segments = [];
  var codeBlockRe = /```(\w*)\n?([\s\S]*?)```/g;
  var lastIdx = 0;
  var m;
  while ((m = codeBlockRe.exec(text)) !== null) {
    if (m.index > lastIdx) {
      segments.push({ type: 'text', content: text.substring(lastIdx, m.index) });
    }
    segments.push({ type: 'code', content: m[2] });
    lastIdx = m.index + m[0].length;
  }
  if (lastIdx < text.length) {
    segments.push({ type: 'text', content: text.substring(lastIdx) });
  }

  for (var s = 0; s < segments.length; s++) {
    var seg = segments[s];
    if (seg.type === 'code') {
      var pre = document.createElement('pre');
      var codeEl = document.createElement('code');
      codeEl.textContent = seg.content.trim();
      pre.appendChild(codeEl);
      container.appendChild(pre);
      continue;
    }

    var blocks = seg.content.split(/\n\n+/);
    for (var i = 0; i < blocks.length; i++) {
      var block = blocks[i].trim();
      if (!block) continue;

      // Headers: # through ######
      var headerMatch = block.match(/^(#{1,6})\s+(.+)$/);
      if (headerMatch && block.indexOf('\n') === -1) {
        var level = Math.min(headerMatch[1].length, 6);
        var h = document.createElement('h' + level);
        renderInlineToDOM(headerMatch[2], h);
        container.appendChild(h);
        continue;
      }

      // Unordered list
      if (/^[-*]\s/.test(block)) {
        var ul = document.createElement('ul');
        var items = block.split(/\n/);
        for (var j = 0; j < items.length; j++) {
          var itemText = items[j].replace(/^[-*]\s+/, '').trim();
          if (itemText) {
            var li = document.createElement('li');
            renderInlineToDOM(itemText, li);
            ul.appendChild(li);
          }
        }
        container.appendChild(ul);
        continue;
      }

      // Ordered list
      if (/^\d+\.\s/.test(block)) {
        var ol = document.createElement('ol');
        var oitems = block.split(/\n/);
        for (var k = 0; k < oitems.length; k++) {
          var oitemText = oitems[k].replace(/^\d+\.\s+/, '').trim();
          if (oitemText) {
            var oli = document.createElement('li');
            renderInlineToDOM(oitemText, oli);
            ol.appendChild(oli);
          }
        }
        container.appendChild(ol);
        continue;
      }

      // Regular paragraph
      var p = document.createElement('p');
      renderInlineToDOM(block, p);
      container.appendChild(p);
    }
  }
}

function renderInlineToDOM(text, parent) {
  // Parse inline elements: **bold**, *italic*, `code`
  var parts = text.split(/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/);
  for (var i = 0; i < parts.length; i++) {
    var part = parts[i];
    if (!part) continue;

    if (part.match(/^\*\*(.+)\*\*$/)) {
      var strong = document.createElement('strong');
      strong.textContent = part.slice(2, -2);
      parent.appendChild(strong);
    } else if (part.match(/^\*(.+)\*$/)) {
      var em = document.createElement('em');
      em.textContent = part.slice(1, -1);
      parent.appendChild(em);
    } else if (part.match(/^`(.+)`$/)) {
      var codeEl = document.createElement('code');
      codeEl.textContent = part.slice(1, -1);
      parent.appendChild(codeEl);
    } else {
      parent.appendChild(document.createTextNode(part));
    }
  }
}

function addMessage(role, text, debugData, msgDate) {
  var now = msgDate ? new Date(msgDate) : new Date();
  var container = document.getElementById('messages');
  maybeAddDateSeparator(now, container);

  var group = document.createElement('div');
  group.className = 'message-group';

  var el = document.createElement('div');
  el.className = 'message ' + role;
  el.setAttribute('data-date', now.toISOString());

  var label = document.createElement('div');
  label.className = 'label';

  var labelText = document.createElement('span');
  labelText.textContent = role === 'user' ? 'You' : 'Bot';
  label.appendChild(labelText);

  var ts = document.createElement('span');
  ts.className = 'timestamp';
  ts.textContent = formatTime(now);
  label.appendChild(ts);

  el.appendChild(label);

  var body = document.createElement('div');
  body.className = 'body';
  if (role === 'assistant') {
    renderMarkdownToDOM(text, body);
  } else {
    body.textContent = text;
  }
  el.appendChild(body);

  group.appendChild(el);

  // Add per-message debug section for bot responses
  if (role === 'assistant' && debugData) {
    var dbg = document.createElement('div');
    dbg.className = 'msg-debug' + (debugVisible ? '' : ' hidden');

    var toggle = document.createElement('button');
    toggle.className = 'msg-debug-toggle';
    var tokenInfo = (debugData.input_tokens || 0) + ' in / ' + (debugData.output_tokens || 0) + ' out';
    var latency = (debugData.duration_ms || 0) + 'ms';
    toggle.textContent = '\u25B6 debug \u00b7 ' + tokenInfo + ' \u00b7 ' + latency;
    toggle.onclick = function() {
      var b = dbg.querySelector('.msg-debug-body');
      b.classList.toggle('open');
      toggle.textContent = (b.classList.contains('open') ? '\u25BC' : '\u25B6') +
        ' debug \u00b7 ' + tokenInfo + ' \u00b7 ' + latency;
    };
    dbg.appendChild(toggle);

    var dbgBody = document.createElement('div');
    dbgBody.className = 'msg-debug-body';

    // Personality
    addDebugRow(dbgBody, 'Personality', debugData.personality || '\u2014');

    // Principles
    if (debugData.principles_active && debugData.principles_active.length > 0) {
      var princRow = document.createElement('div');
      princRow.className = 'msg-debug-row';
      var princKey = document.createElement('span');
      princKey.className = 'key';
      princKey.textContent = 'Principles';
      princRow.appendChild(princKey);
      var princVal = document.createElement('span');
      princVal.className = 'val';
      debugData.principles_active.forEach(function(p) {
        var pill = document.createElement('span');
        pill.className = 'debug-pill';
        pill.textContent = p;
        princVal.appendChild(pill);
      });
      princRow.appendChild(princVal);
      dbgBody.appendChild(princRow);
    }

    // Tools called
    if (debugData.tools_called && debugData.tools_called.length > 0) {
      debugData.tools_called.forEach(function(t) {
        var toolRow = document.createElement('div');
        toolRow.style.padding = '4px 0';
        var name = document.createElement('span');
        name.className = 'debug-tool-name';
        name.textContent = t.name;
        toolRow.appendChild(name);
        if (t.arguments && Object.keys(t.arguments).length > 0) {
          var args = document.createElement('span');
          args.className = 'debug-tool-args';
          args.textContent = JSON.stringify(t.arguments);
          toolRow.appendChild(args);
        }
        dbgBody.appendChild(toolRow);
      });
    } else {
      addDebugRow(dbgBody, 'Tools', 'none called');
    }

    // Tokens
    addDebugRow(dbgBody, 'Tokens', tokenInfo);

    // Latency
    addDebugRow(dbgBody, 'Latency', (debugData.duration_ms / 1000).toFixed(1) + 's (' + debugData.duration_ms + 'ms)');

    // Memory count
    addDebugRow(dbgBody, 'Memory', (debugData.memory_count || 0) + ' messages');

    // Cost
    var msgCost = calculateCost(selectedProvider, debugData.input_tokens || 0, debugData.output_tokens || 0);
    addDebugRow(dbgBody, 'Cost', formatCost(msgCost));

    dbg.appendChild(dbgBody);
    group.appendChild(dbg);
  }

  container.appendChild(group);
  container.scrollTop = container.scrollHeight;
  updateSeedButtonVisibility();
}

function addDebugRow(parent, key, val) {
  var row = document.createElement('div');
  row.className = 'msg-debug-row';
  var k = document.createElement('span');
  k.className = 'key';
  k.textContent = key;
  var v = document.createElement('span');
  v.className = 'val';
  v.textContent = val;
  row.appendChild(k);
  row.appendChild(v);
  parent.appendChild(row);
}

var typingTimer = null;
var typingStartTime = null;

function showTyping(label) {
  var typingLabel = label || 'Thinking...';
  var existing = document.getElementById('typingIndicator');
  if (existing) existing.remove();

  var el = document.createElement('div');
  el.className = 'typing-indicator';
  el.id = 'typingIndicator';

  var dots = document.createElement('div');
  dots.className = 'dots';
  for (var i = 0; i < 3; i++) {
    var dot = document.createElement('div');
    dot.className = 'dot';
    dots.appendChild(dot);
  }
  el.appendChild(dots);

  var txt = document.createElement('span');
  txt.id = 'typingText';
  txt.textContent = typingLabel;
  el.appendChild(txt);

  var container = document.getElementById('messages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;

  typingStartTime = Date.now();
  typingTimer = setInterval(function() {
    var elapsed = Math.floor((Date.now() - typingStartTime) / 1000);
    var textEl = document.getElementById('typingText');
    if (!textEl) { clearInterval(typingTimer); return; }
    if (elapsed > 30) {
      textEl.textContent = 'Still thinking \u2014 local models can take a moment... (' + elapsed + 's)';
    } else {
      textEl.textContent = typingLabel + ' (' + elapsed + 's)';
    }
  }, 1000);
}

function hideTyping() {
  if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
  typingStartTime = null;
  var el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

var lastSentText = '';

function sendMessage() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;

  lastSentText = text;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  saveConversation();

  var btn = document.getElementById('sendBtn');
  btn.disabled = true;

  showTyping('Streaming...');

  sendMessageStream(text).catch(function() {
    // SSE failed, fall back to non-streaming
    return sendMessageNonStream(text);
  }).finally(function() {
    btn.disabled = false;
    input.focus();
  });
}

function sendMessageStream(text) {
  return fetch(API + '/api/chat/stream', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text, conversation_id: conversationId})
  }).then(function(resp) {
    if (!resp.ok || !resp.body) {
      // If status is 401/503, parse the JSON error
      return resp.json().then(function(errData) {
        hideTyping();
        addErrorMessage(errData.error || 'Request failed', errData.detail || '');
        saveConversation();
        return Promise.resolve();
      });
    }

    hideTyping();
    // Create bot message bubble to stream into
    var group = document.createElement('div');
    group.className = 'message-group';
    group.id = 'streaming-group';

    var el = document.createElement('div');
    el.className = 'message assistant';

    var label = document.createElement('div');
    label.className = 'label';
    var labelText = document.createElement('span');
    labelText.textContent = 'Bot';
    label.appendChild(labelText);
    var ts = document.createElement('span');
    ts.className = 'timestamp';
    ts.textContent = formatTime(new Date());
    label.appendChild(ts);
    el.appendChild(label);

    var body = document.createElement('div');
    body.className = 'body';

    // Show pulsing typing dots inside the bubble until first token arrives
    var inlineDots = document.createElement('div');
    inlineDots.className = 'typing-dots-inline';
    inlineDots.id = 'streamingDots';
    for (var d = 0; d < 3; d++) {
      var dotEl = document.createElement('div');
      dotEl.className = 'dot';
      inlineDots.appendChild(dotEl);
    }
    body.appendChild(inlineDots);

    el.appendChild(body);
    group.appendChild(el);

    var container = document.getElementById('messages');
    container.appendChild(group);
    var dotsRemoved = false;

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var fullText = '';
    var buffer = '';

    function processStream() {
      return reader.read().then(function(result) {
        if (result.done) {
          // Stream ended without done event — finalize
          // Remove typing dots if still present
          var remainingDots = document.getElementById('streamingDots');
          if (remainingDots) remainingDots.remove();
          if (fullText) {
            while (body.firstChild) body.removeChild(body.firstChild);
            renderMarkdownToDOM(fullText, body);
            saveConversation();
          }
          return;
        }

        buffer += decoder.decode(result.value, {stream: true});
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line.startsWith('data: ')) continue;
          var jsonStr = line.substring(6);
          try {
            var evt = JSON.parse(jsonStr);
          } catch(e) { continue; }

          if (evt.type === 'token') {
            // Remove typing dots on first token
            if (!dotsRemoved) {
              var dots = document.getElementById('streamingDots');
              if (dots) dots.remove();
              dotsRemoved = true;
            }
            fullText += evt.content;
            body.textContent = fullText;
            container.scrollTop = container.scrollHeight;
          } else if (evt.type === 'done') {
            // Re-render with markdown
            while (body.firstChild) body.removeChild(body.firstChild);
            renderMarkdownToDOM(fullText, body);

            // Add debug data
            var debugData = {
              personality: evt.personality,
              principles_active: evt.principles_active,
              tools_called: evt.tools_called,
              input_tokens: evt.tokens ? evt.tokens.input : 0,
              output_tokens: evt.tokens ? evt.tokens.output : 0,
              duration_ms: evt.duration_ms || 0,
              memory_count: evt.memory_count || 0
            };
            appendDebugToGroup(group, debugData);
            updateSidebarDebug(debugData);
            saveConversation();
          } else if (evt.type === 'error') {
            var streamGroup = document.getElementById('streaming-group');
            if (streamGroup) streamGroup.remove();
            addErrorMessage(evt.error || 'Stream error', '');
            saveConversation();
            return;
          }
        }

        return processStream();
      });
    }

    return processStream();
  });
}

function sendMessageNonStream(text) {
  showTyping('Thinking...');
  return fetch(API + '/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text, conversation_id: conversationId})
  })
  .then(function(resp) {
    if (resp.status === 503 || resp.status === 401) {
      return resp.json().then(function(errData) {
        hideTyping();
        addErrorMessage(errData.error || 'Request failed', errData.detail || '');
        saveConversation();
      });
    }
    return resp.json().then(function(data) {
      hideTyping();
      if (data.error) {
        addErrorMessage(data.error, data.detail || '');
      } else {
        addMessage('assistant', data.response, data);
        updateSidebarDebug(data);
      }
      saveConversation();
    });
  })
  .catch(function(e) {
    hideTyping();
    addErrorMessage('Connection error', e.message);
    saveConversation();
  });
}

function addErrorMessage(error, detail) {
  var providerLabel = selectedProvider || 'LLM';
  var msg = 'Could not reach ' + providerLabel + '. ' + error;
  if (detail) msg += '\n' + detail;

  var group = document.createElement('div');
  group.className = 'message-group';

  var el = document.createElement('div');
  el.className = 'message error';

  var label = document.createElement('div');
  label.className = 'label';
  var labelText = document.createElement('span');
  labelText.textContent = 'Error';
  label.appendChild(labelText);
  var ts = document.createElement('span');
  ts.className = 'timestamp';
  ts.textContent = formatTime(new Date());
  label.appendChild(ts);
  el.appendChild(label);

  var body = document.createElement('div');
  body.className = 'body';
  body.textContent = msg;
  el.appendChild(body);

  var retryBtn = document.createElement('button');
  retryBtn.className = 'btn-retry';
  retryBtn.textContent = 'Retry';
  retryBtn.onclick = function() {
    group.remove();
    document.getElementById('input').value = lastSentText;
    sendMessage();
  };
  el.appendChild(retryBtn);

  group.appendChild(el);
  var container = document.getElementById('messages');
  container.appendChild(group);
  container.scrollTop = container.scrollHeight;
}

function appendDebugToGroup(group, debugData) {
  var dbg = document.createElement('div');
  dbg.className = 'msg-debug' + (debugVisible ? '' : ' hidden');

  var toggle = document.createElement('button');
  toggle.className = 'msg-debug-toggle';
  var tokenInfo = (debugData.input_tokens || 0) + ' in / ' + (debugData.output_tokens || 0) + ' out';
  var latency = (debugData.duration_ms || 0) + 'ms';
  toggle.textContent = '\u25B6 debug \u00b7 ' + tokenInfo + ' \u00b7 ' + latency;
  toggle.onclick = function() {
    var b = dbg.querySelector('.msg-debug-body');
    b.classList.toggle('open');
    toggle.textContent = (b.classList.contains('open') ? '\u25BC' : '\u25B6') +
      ' debug \u00b7 ' + tokenInfo + ' \u00b7 ' + latency;
  };
  dbg.appendChild(toggle);

  var dbgBody = document.createElement('div');
  dbgBody.className = 'msg-debug-body';
  addDebugRow(dbgBody, 'Personality', debugData.personality || '\u2014');
  addDebugRow(dbgBody, 'Tokens', tokenInfo);
  addDebugRow(dbgBody, 'Latency', ((debugData.duration_ms || 0) / 1000).toFixed(1) + 's');
  addDebugRow(dbgBody, 'Memory', (debugData.memory_count || 0) + ' messages');
  var msgCost = calculateCost(selectedProvider, debugData.input_tokens || 0, debugData.output_tokens || 0);
  addDebugRow(dbgBody, 'Cost', formatCost(msgCost));
  dbg.appendChild(dbgBody);

  group.id = '';
  group.appendChild(dbg);
}

function updateSidebarDebug(data) {
  document.getElementById('debugPersonality').textContent = data.personality || '\u2014';

  var princEl = document.getElementById('debugPrinciples');
  while (princEl.firstChild) princEl.removeChild(princEl.firstChild);
  var principles = data.principles_active || [];
  if (principles.length > 0) {
    principles.forEach(function(p) {
      var tag = document.createElement('span');
      tag.className = 'debug-tag';
      tag.textContent = p;
      princEl.appendChild(tag);
    });
  } else {
    princEl.textContent = '\u2014';
  }

  var toolsCalled = data.tools_called || [];
  document.getElementById('debugTools').textContent =
    toolsCalled.length > 0 ? toolsCalled.map(function(t) { return t.name; }).join(', ') : 'none called';
  document.getElementById('debugMemory').textContent = (data.memory_count || 0) + ' messages';

  var inTok = data.input_tokens || (data.tokens ? data.tokens.input : 0) || 0;
  var outTok = data.output_tokens || (data.tokens ? data.tokens.output : 0) || 0;
  document.getElementById('debugTokens').textContent = inTok + ' in / ' + outTok + ' out';

  var durMs = data.duration_ms || 0;
  document.getElementById('debugLatency').textContent = (durMs / 1000).toFixed(1) + 's (' + durMs + 'ms)';

  // Cost calculation
  var msgCost = calculateCost(selectedProvider, inTok, outTok);
  document.getElementById('debugCost').textContent = formatCost(msgCost);
  if (msgCost !== null) {
    sessionCost += msgCost;
  }
  document.getElementById('debugSessionCost').textContent = sessionCost > 0 ? '$' + sessionCost.toFixed(4) : (msgCost === null ? 'free' : '$0.0000');
}

function renderProviderCards() {
  var container = document.getElementById('providerCards');
  while (container.firstChild) container.removeChild(container.firstChild);
  Object.keys(llmProviders).forEach(function(pid) {
    var prov = llmProviders[pid];

    card.setAttribute('data-provider', pid);
    card.onclick = function() { selectProvider(pid); };

    var icon = document.createElement('div');
    icon.className = 'provider-icon';
    icon.textContent = PROVIDER_ICONS[pid] || '\uD83E\uDD16';
    card.appendChild(icon);

    label.className = 'provider-label';
    label.textContent = prov.label || pid;

function selectProvider(pid) {
  selectedProvider = pid;
  var prov = llmProviders[pid];
  if (!prov) return;

  // Highlight selected card
  var cards = document.querySelectorAll('.provider-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.toggle('selected', cards[i].getAttribute('data-provider') === pid);
  }

  // Populate model dropdown
  var modelSel = document.getElementById('settingsModel');
  while (modelSel.firstChild) modelSel.removeChild(modelSel.firstChild);
  (prov.model_choices || []).forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    modelSel.appendChild(opt);
  });
  modelSel.value = prov.default_model || '';

  // Set base URL
  document.getElementById('settingsBaseUrl').value = prov.default_base_url || '';

  // Show/hide API key field
  var keyRow = document.getElementById('apiKeyRow');
  if (prov.needs_key) {
    keyRow.classList.add('visible');
  } else {
    keyRow.classList.remove('visible');
  }
  document.getElementById('settingsApiKey').value = '';

  // Load saved config for this provider
  fetch(API + '/api/llm/config?provider_id=' + encodeURIComponent(pid))
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
      if (cfg.base_url) document.getElementById('settingsBaseUrl').value = cfg.base_url;
      if (cfg.model) modelSel.value = cfg.model;
      if (cfg.has_key) document.getElementById('settingsApiKey').placeholder = '\u2022\u2022\u2022\u2022 (saved)';
      else document.getElementById('settingsApiKey').placeholder = 'sk-...';
    })
    .catch(function() {});

  document.getElementById('testResult').textContent = '';
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function applyLLMSettings() {
  var model = document.getElementById('settingsModel').value;
  var baseUrl = document.getElementById('settingsBaseUrl').value.trim();
  var apiKey = document.getElementById('settingsApiKey').value.trim();
  var personality = document.getElementById('settingsPersonality').value;
  var project = document.getElementById('settingsProject').value;

  // Save provider config if key or url changed
  var configPayload = { provider_id: selectedProvider };
  if (baseUrl) configPayload.base_url = baseUrl;
  if (model) configPayload.model = model;
  if (apiKey) configPayload.api_key = apiKey;

  // Save config then switch provider
  fetch(API + '/api/llm/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(configPayload)
  })
  .then(function() {
    return fetch(API + '/api/llm/switch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ provider_id: selectedProvider, model: model })
    });
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) {
      var el = document.getElementById('testResult');
      el.className = 'test-result fail';
      el.textContent = 'Error: ' + data.error;
      return;
    }
    // Update header — use provider label, not ID
    var provLabel = (llmProviders[selectedProvider] || {}).label || selectedProvider;
    document.getElementById('modelInfo').textContent =
      provLabel + ' \u00b7 ' + (data.model || model);
    document.getElementById('statusDot').className = 'status-dot ok';

    // Switch personality if changed
    if (personality) {
      fetch(API + '/api/config', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ personality: personality })
      }).then(function(r) { return r.json(); }).then(function(cfg) {
        document.getElementById('debugPersonality').textContent = cfg.personality || '';
        document.getElementById('modelInfo').textContent =
          provLabel + ' \u00b7 ' + (data.model || model) + ' \u00b7 ' + cfg.personality;
      }).catch(function() {});
    }

    // Switch project if changed
    if (project) {
      fetch(API + '/api/projects/switch', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({slug: project})
      }).catch(function() {});
    }

    closeSettings();
  })
  .catch(function(e) {
    var el = document.getElementById('testResult');
    el.className = 'test-result fail';
    el.textContent = 'Failed: ' + e.message;
  });
}

function testConnection() {
  var el = document.getElementById('testResult');
  el.className = 'test-result';
  el.textContent = 'Testing...';

  // Save config first (in case key/url changed), then check health
  var model = document.getElementById('settingsModel').value;
  var baseUrl = document.getElementById('settingsBaseUrl').value.trim();
  var apiKey = document.getElementById('settingsApiKey').value.trim();

  var configPayload = { provider_id: selectedProvider };
  if (baseUrl) configPayload.base_url = baseUrl;
  if (model) configPayload.model = model;
  if (apiKey) configPayload.api_key = apiKey;

  fetch(API + '/api/llm/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(configPayload)
  })
  .then(function() {
    return fetch(API + '/api/health');
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'ok' || data.ollama === 'ok') {
      el.className = 'test-result ok';
      el.textContent = '\u2714 Connected to ' + (data.provider || 'LLM') + ' / ' + (data.model || '');

      el.className = 'test-result fail';

    }
  })
  .catch(function(e) {
    el.className = 'test-result fail';
    el.textContent = '\u2718 Connection failed: ' + e.message;
  });
}

// -- Conversation Persistence --

function saveConversation() {
  var msgs = document.querySelectorAll('.message-group');
  var messages = [];
  for (var i = 0; i < msgs.length; i++) {
    var msgEl = msgs[i].querySelector('.message');
    if (!msgEl) continue;
    var role = msgEl.classList.contains('user') ? 'user' :
               msgEl.classList.contains('error') ? 'error' : 'assistant';
    var bodyEl = msgEl.querySelector('.body');
    var content = bodyEl ? bodyEl.textContent : '';
    var tsEl = msgEl.querySelector('.timestamp');
    messages.push({
      role: role,
      content: content,
      timestamp: tsEl ? tsEl.textContent : '',
      dateISO: msgEl.getAttribute('data-date') || new Date().toISOString()
    });
  }
  var state = {
    conversationId: conversationId,
    messages: messages,
    provider: selectedProvider,
    model: document.getElementById('modelInfo') ? document.getElementById('modelInfo').textContent : ''
  };
  try {
    localStorage.setItem('conv_' + conversationId, JSON.stringify(state));
    localStorage.setItem('lastConversationId', conversationId);
  } catch(e) {}
}

function restoreConversation() {
  var savedId = localStorage.getItem('lastConversationId');
  if (!savedId) return false;

  var raw = localStorage.getItem('conv_' + savedId);
  if (!raw) return false;

  try {
    var state = JSON.parse(raw);
    if (!state.messages || state.messages.length === 0) return false;

    conversationId = state.conversationId;
    document.getElementById('debugConvId').textContent = conversationId;
    document.getElementById('settingsConvId').textContent = conversationId;

    lastMessageDateStr = null;
    for (var i = 0; i < state.messages.length; i++) {
      var m = state.messages[i];
      if (m.role === 'error') {
        // Skip error messages on restore
        continue;
      }
      addMessage(m.role, m.content, null, m.dateISO || null);
    }
    return true;
  } catch(e) {
    return false;
  }
}

function clearConversationStorage() {
  try {
    localStorage.removeItem('conv_' + conversationId);
    localStorage.removeItem('lastConversationId');
  } catch(e) {}
}

function refreshConversationList() {
  var list = document.getElementById('convList');
  while (list.firstChild) list.removeChild(list.firstChild);

  var query = (typeof convSearchQuery === 'string') ? convSearchQuery : '';
  var convs = [];
  for (var i = 0; i < localStorage.length; i++) {
    var key = localStorage.key(i);
    if (!key || !key.startsWith('conv_')) continue;
    try {
      var state = JSON.parse(localStorage.getItem(key));
      if (!state || !state.messages || state.messages.length === 0) continue;
      var firstUser = '';
      var msgCount = 0;
      var allText = '';
      var matchSnippet = '';
      for (var j = 0; j < state.messages.length; j++) {
        var msg = state.messages[j];
        if (msg.role === 'user' && !firstUser) {
          firstUser = msg.content;
        }
        if (msg.role !== 'error') msgCount++;
        allText += ' ' + (msg.content || '');
      }

      // Filter by search query
      if (query) {
        var lowerText = allText.toLowerCase();
        var idx = lowerText.indexOf(query);
        if (idx === -1) continue;
        // Extract a snippet around the match
        var start = Math.max(0, idx - 15);
        var end = Math.min(allText.length, idx + query.length + 25);
        matchSnippet = (start > 0 ? '...' : '') +
          allText.substring(start, end).trim() +
          (end < allText.length ? '...' : '');
      }

      convs.push({
        id: state.conversationId,
        preview: firstUser ? firstUser.substring(0, 40) : '(empty)',
        msgCount: msgCount,
        timestamp: state.messages[state.messages.length - 1].timestamp || '',
        key: key,
        matchSnippet: matchSnippet
      });
    } catch(e) { continue; }
  }

  // Sort by key (most recent first)
  convs.sort(function(a, b) { return b.key.localeCompare(a.key); });

  if (convs.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'padding:20px 12px;color:var(--text-muted);font-size:12px;text-align:center';
    empty.textContent = query ? 'No matching conversations' : 'No conversations yet';
    list.appendChild(empty);
    return;
  }

  for (var c = 0; c < convs.length; c++) {
    var conv = convs[c];
    var item = document.createElement('button');
    item.className = 'conv-item' + (conv.id === conversationId ? ' active' : '');
    item.setAttribute('data-conv-id', conv.id);
    item.onclick = (function(cid) {
      return function() { switchToConversation(cid); };
    })(conv.id);

    var content = document.createElement('div');
    content.className = 'conv-item-content';

    var preview = document.createElement('div');
    preview.className = 'conv-item-preview';
    var customTitle = localStorage.getItem('conv_title_' + conv.id);
    if (query && conv.matchSnippet) {
      highlightText(conv.matchSnippet, query, preview);
    } else {
      preview.textContent = customTitle || conv.preview;
    }
    preview.setAttribute('data-conv-id', conv.id);
    preview.setAttribute('data-default-title', conv.preview);
    preview.addEventListener('click', function(e) {
      startTitleEdit(e.currentTarget);
      e.stopPropagation();
    });
    content.appendChild(preview);

    var meta = document.createElement('div');
    meta.className = 'conv-item-meta';
    var ts = document.createElement('span');
    ts.textContent = conv.timestamp;
    meta.appendChild(ts);
    var count = document.createElement('span');
    count.textContent = conv.msgCount + ' msgs';
    meta.appendChild(count);
    content.appendChild(meta);

    item.appendChild(content);

    // Delete button
    var delBtn = document.createElement('button');
    delBtn.className = 'conv-item-delete';
    delBtn.textContent = '\u00d7';
    delBtn.title = 'Delete conversation';
    delBtn.onclick = (function(cid) {
      return function(e) { deleteConversation(cid, e); };
    })(conv.id);
    item.appendChild(delBtn);

    list.appendChild(item);
  }
}

function highlightText(text, query, container) {
  var lower = text.toLowerCase();
  var idx = lower.indexOf(query);
  if (idx === -1) {
    container.textContent = text;
    return;
  }
  container.appendChild(document.createTextNode(text.substring(0, idx)));
  var mark = document.createElement('mark');
  mark.className = 'search-highlight';
  mark.textContent = text.substring(idx, idx + query.length);
  container.appendChild(mark);
  container.appendChild(document.createTextNode(text.substring(idx + query.length)));
}

function switchToConversation(cid) {
  if (cid === conversationId) return;

  // Save current conversation first
  saveConversation();

  var raw = localStorage.getItem('conv_' + cid);
  if (!raw) return;

  try {
    var state = JSON.parse(raw);
    if (!state.messages) return;

    conversationId = state.conversationId;
    document.getElementById('debugConvId').textContent = conversationId;
    document.getElementById('settingsConvId').textContent = conversationId;
    localStorage.setItem('lastConversationId', conversationId);

    // Clear and reload messages
    clearContainer(document.getElementById('messages'));
    lastMessageDateStr = null;
    for (var i = 0; i < state.messages.length; i++) {
      var m = state.messages[i];
      if (m.role === 'error') continue;
      addMessage(m.role, m.content, null, m.dateISO || null);
    }

    // Scroll to bottom
    var msgContainer = document.getElementById('messages');
    msgContainer.scrollTop = msgContainer.scrollHeight;
    updateSeedButtonVisibility();

    // Refresh sidebar highlighting
    refreshConversationList();

    // Close sidebar on mobile
    if (window.innerWidth <= 768 && sidebarOpen) {
      toggleSidebar();
    }
  } catch(e) {}
}

// -- Theme Toggle --

function toggleTheme() {
  var html = document.documentElement;
  var isLight = html.classList.toggle('light');
  html.classList.toggle('dark', !isLight);
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  updateThemeIcon();
}

function updateThemeIcon() {
  var btn = document.getElementById('themeToggle');
  var isLight = document.documentElement.classList.contains('light');
  btn.textContent = isLight ? '\u2600' : '\u263E';
  btn.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';
}

function restoreTheme() {
  var saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.classList.add('light');
  } else if (saved === 'dark') {
    document.documentElement.classList.add('dark');
  } else {
    // No saved preference — use system preference
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.classList.add('light');
    }
  }
  updateThemeIcon();
}

// -- Delete Conversation --

function deleteConversation(cid, evt) {
  if (evt) { evt.stopPropagation(); evt.preventDefault(); }
  if (!confirm('Delete this conversation?')) return;

  try {
    localStorage.removeItem('conv_' + cid);
  } catch(e) {}

  if (cid === conversationId) {
    conversationId = 'web-' + Date.now().toString(36);
    lastMessageDateStr = null;
    clearContainer(document.getElementById('messages'));
    document.getElementById('debugConvId').textContent = conversationId;
    document.getElementById('settingsConvId').textContent = conversationId;
    localStorage.setItem('lastConversationId', conversationId);
    showWelcomeMessage();
  }

  refreshConversationList();
}

// -- Search/Filter Conversations --

var convSearchQuery = '';

function filterConversations() {
  convSearchQuery = (document.getElementById('convSearchInput').value || '').trim().toLowerCase();
  refreshConversationList();
}

// -- Conversation Title Editing --

function startTitleEdit(el) {
  if (el.contentEditable === 'true') return;
  el.contentEditable = 'true';
  el.focus();
  // Select all text
  var range = document.createRange();
  range.selectNodeContents(el);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  el.addEventListener('keydown', function onKey(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      el.blur();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      var cid = el.getAttribute('data-conv-id');
      var saved = localStorage.getItem('conv_title_' + cid);
      el.textContent = saved || el.getAttribute('data-default-title');
      el.contentEditable = 'false';
      el.removeEventListener('keydown', onKey);
    }
  });

  el.addEventListener('blur', function onBlur() {
    el.contentEditable = 'false';
    var cid = el.getAttribute('data-conv-id');
    var newTitle = el.textContent.trim();
    if (newTitle && newTitle !== el.getAttribute('data-default-title')) {
      localStorage.setItem('conv_title_' + cid, newTitle);
    } else {
      localStorage.removeItem('conv_title_' + cid);
      el.textContent = el.getAttribute('data-default-title');
    }
    el.removeEventListener('blur', onBlur);
  }, { once: true });
}

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

restoreTheme();
init();
</script>
