<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Discovery Agent</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --user-bg: #1f6feb22;
    --bot-bg: #161b22;
    --success: #3fb950;
    --warning: #d29922;
    --error: #f85149;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header h1 { font-size: 16px; font-weight: 600; }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .btn-small {
    background: var(--bg-tertiary);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }

  .btn-small:hover { color: var(--text); border-color: var(--accent); }
  .btn-small.active { color: var(--accent); border-color: var(--accent); }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .status-dot.ok { background: var(--success); }
  .status-dot.error { background: var(--error); }
  .status-dot.loading { background: var(--warning); }

  /* Main layout */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .message-group {
    margin-bottom: 20px;
  }

  .message {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
  }

  .message.user {
    margin-left: auto;
    background: var(--user-bg);
    border: 1px solid var(--accent-dim);
  }

  .message.assistant {
    margin-right: auto;
    background: var(--bot-bg);
    border: 1px solid var(--border);
  }

  .message .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .message .timestamp {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }

  .message .body { white-space: pre-wrap; }
  .message .body p { margin-bottom: 8px; }
  .message .body p:last-child { margin-bottom: 0; }
  .message .body strong { font-weight: 600; color: var(--text); }
  .message .body code {
    background: var(--bg-tertiary);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 13px;
  }
  .message .body pre {
    background: var(--bg-tertiary);
    padding: 10px 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 13px;
    white-space: pre;
    line-height: 1.4;
  }
  .message .body pre code {
    background: none;
    padding: 0;
    border-radius: 0;
  }
  .message .body ul, .message .body ol {
    margin: 6px 0;
    padding-left: 20px;
  }
  .message .body li { margin-bottom: 4px; }

  /* Per-message debug section */
  .msg-debug {
    max-width: 75%;
    margin-right: auto;
    margin-top: 6px;
    font-size: 11px;
    font-family: 'SF Mono', Menlo, monospace;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .msg-debug.hidden { display: none; }

  .msg-debug-toggle {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'SF Mono', Menlo, monospace;
    padding: 6px 10px;
    cursor: pointer;
    text-align: left;
  }

  .msg-debug-toggle:hover { color: var(--accent); }

  .msg-debug-body {
    display: none;
    padding: 8px 10px;
    border-top: 1px solid var(--border);
  }

  .msg-debug-body.open { display: block; }

  .msg-debug-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }

  .msg-debug-row .key { color: var(--text-muted); }
  .msg-debug-row .val { color: var(--text); text-align: right; }

  .debug-pill {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
    margin: 1px 2px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--accent);
  }

  .debug-tool-name {
    color: var(--warning);
    font-weight: 600;
  }

  .debug-tool-args {
    color: var(--text-muted);
    font-size: 10px;
    display: block;
    margin-top: 2px;
  }

  /* Input */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .input-area textarea {
    flex: 1;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 42px;
    max-height: 120px;
  }

  .input-area textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .input-area button {
    background: var(--accent-dim);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }

  .input-area button:hover { background: var(--accent); }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .typing-indicator .dots {
    display: flex;
    gap: 3px;
  }

  .typing-indicator .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typing-bounce 1.4s infinite ease-in-out;
  }

  .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-4px); opacity: 1; }
  }

  /* Debug sidebar panel */
  .debug-panel {
    width: 300px;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    font-size: 12px;
    transition: width 0.2s, padding 0.2s;
    flex-shrink: 0;
  }

  .debug-panel.collapsed {
    width: 0;
    padding: 0;
    overflow: hidden;
    border-left: none;
  }

  .debug-panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .debug-panel h3:first-child { margin-top: 0; }

  .debug-value {
    color: var(--text);
    padding: 4px 8px;
    background: var(--bg-tertiary);
    border-radius: 4px;
    margin-bottom: 4px;
    font-family: 'SF Mono', Menlo, monospace;
  }

  .debug-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    margin: 2px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
  }

  /* Settings panel (slide-out overlay) */
  .settings-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
  }

  .settings-overlay.open { display: flex; justify-content: flex-end; }

  .settings-panel {
    width: 360px;
    max-width: 90vw;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: slide-in 0.2s ease-out;
  }

  @keyframes slide-in {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  .settings-panel h2 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .settings-panel .close-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
  }

  .settings-panel .close-btn:hover { color: var(--text); }

  .settings-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .settings-group label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .settings-group select,
  .settings-group input[type="text"] {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    font-family: inherit;
  }

  .settings-group select:focus,
  .settings-group input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .settings-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn-settings {
    background: var(--bg-tertiary);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  .btn-settings:hover { border-color: var(--accent); color: var(--accent); }

  .btn-settings.primary {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
    color: white;
  }

  .btn-settings.primary:hover { background: var(--accent); }

  .btn-settings.danger { color: var(--error); }
  .btn-settings.danger:hover { border-color: var(--error); }

  .settings-group input[type="password"] {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    font-family: inherit;
  }

  .settings-group input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .provider-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .provider-card {
    background: var(--bg-tertiary);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s;
  }

  .provider-card:hover { border-color: var(--accent-dim); }
  .provider-card.selected { border-color: var(--accent); background: var(--user-bg); }

  .provider-card .provider-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .provider-card .provider-icon {
    font-size: 20px;
    margin-bottom: 4px;
  }

  .provider-key-row { display: none; }
  .provider-key-row.visible { display: flex; }

  .test-result {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    margin-top: 4px;
  }

  .test-result.ok { color: var(--success); background: rgba(63,185,80,0.1); }
  .test-result.fail { color: var(--error); background: rgba(248,81,73,0.1); }

  .conv-id-display {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    padding: 6px 10px;
    border-radius: 4px;
    word-break: break-all;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .message { max-width: 90%; }
    .msg-debug { max-width: 90%; }
    .debug-panel { display: none; }
    .debug-panel.collapsed { display: none; }
    .header h1 { font-size: 14px; }
    .settings-panel { width: 100vw; max-width: 100vw; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Customer Discovery Agent</h1>
  <div class="header-actions">
    <button class="btn-small" onclick="newConversation()" title="New Chat">+ New Chat</button>
    <button class="btn-small" onclick="openSettings()" title="Settings" style="font-size:20px;padding:4px 12px;line-height:1">&#9881;</button>
    <button class="btn-small" id="debugToggle" onclick="toggleDebug()" title="Toggle debug panels">Debug</button>
    <div class="header-meta">
      <span class="status-dot loading" id="statusDot"></span>
      <span id="modelInfo">connecting...</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Type a message..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="debug-panel collapsed" id="debugPanel">
    <h3>Status</h3>
    <div class="debug-value" id="debugStatus">Connecting...</div>

    <h3>Personality</h3>
    <div class="debug-value" id="debugPersonality">&mdash;</div>

    <h3>Principles Active</h3>
    <div id="debugPrinciples">&mdash;</div>

    <h3>Tools Called</h3>
    <div class="debug-value" id="debugTools">none</div>

    <h3>Memory</h3>
    <div class="debug-value" id="debugMemory">0 messages</div>

    <h3>Tokens</h3>
    <div class="debug-value" id="debugTokens">&mdash;</div>

    <h3>Latency</h3>
    <div class="debug-value" id="debugLatency">&mdash;</div>

    <h3>Conversation</h3>
    <div class="debug-value" id="debugConvId">&mdash;</div>
  </div>
</div>

<!-- Settings overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <h2>
      Settings
      <button class="close-btn" onclick="closeSettings()">&times;</button>
    </h2>

    <div class="settings-group">
      <label>LLM Provider</label>
      <div class="provider-cards" id="providerCards">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="settings-group">
      <label>Model</label>
      <select id="settingsModel"><option>Loading...</option></select>
    </div>

    <div class="settings-group provider-key-row" id="apiKeyRow">
      <label>API Key</label>
      <input type="password" id="settingsApiKey" placeholder="sk-...">
    </div>

    <div class="settings-group">
      <label>Base URL</label>
      <input type="text" id="settingsBaseUrl" placeholder="http://localhost:11434/v1">
    </div>

    <div class="settings-group">
      <label>Active Project</label>
      <select id="settingsProject"><option>Loading...</option></select>
    </div>

    <div class="settings-group">
      <label>Personality</label>
      <select id="settingsPersonality"><option>Loading...</option></select>
    </div>

    <div class="settings-group">
      <label>Conversation ID</label>
      <div class="conv-id-display" id="settingsConvId"></div>
    </div>

    <div class="settings-actions">
      <button class="btn-settings primary" onclick="applyLLMSettings()">Save &amp; Switch</button>
      <button class="btn-settings" onclick="testConnection()">Test Connection</button>
      <button class="btn-settings" onclick="newConversation()">New Conversation</button>
      <button class="btn-settings danger" onclick="clearHistory()">Clear History</button>
    </div>
    <div id="testResult"></div>
  </div>
</div>

<script>
var API = '';
var conversationId = 'web-' + Date.now().toString(36);
var debugVisible = false;
var llmProviders = {};
var selectedProvider = '';

var PROVIDER_ICONS = {
  'qwen-3.5': '\uD83E\uDD16',
  'ollama-other': '\uD83E\uDD99',
  'claude-haiku': '\u26A1',
  'claude-sonnet': '\uD83C\uDFB5',
  'claude-opus': '\uD83C\uDFAD',
  'chatgpt': '\uD83D\uDCAC'
};

function init() {
  document.getElementById('debugConvId').textContent = conversationId;
  document.getElementById('settingsConvId').textContent = conversationId;

  fetch(API + '/api/health')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var dot = document.getElementById('statusDot');
      dot.className = 'status-dot ' + (data.ollama === 'ok' ? 'ok' : 'error');
      var provLabel = data.provider || 'ollama';
      document.getElementById('modelInfo').textContent = provLabel + ' \u00b7 ' + data.model + ' \u00b7 ' + data.personality;
      document.getElementById('debugStatus').textContent = 'LLM: ' + data.ollama;
      document.getElementById('debugPersonality').textContent = data.personality;
    })
    .catch(function(e) {
      document.getElementById('statusDot').className = 'status-dot error';
      document.getElementById('modelInfo').textContent = 'disconnected';
      document.getElementById('debugStatus').textContent = 'Error: ' + e.message;
    });

  // Load LLM providers
  fetch(API + '/api/llm/providers')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      llmProviders = data.providers || {};
      selectedProvider = data.active_provider || '';
    })
    .catch(function() {});

  // Load personalities list
  fetch(API + '/api/personalities')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var sel = document.getElementById('settingsPersonality');
      while (sel.firstChild) sel.removeChild(sel.firstChild);
      (data.personalities || []).forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        sel.appendChild(opt);
      });
      return fetch(API + '/api/config');
    })
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
      document.getElementById('settingsPersonality').value = cfg.personality || '';
    })
    .catch(function() {});

  // Restore debug panel preference from localStorage
  var savedDebug = localStorage.getItem('debugPanelVisible');
  if (savedDebug === 'true') {
    debugVisible = true;
    document.getElementById('debugToggle').classList.add('active');
    document.getElementById('debugPanel').classList.remove('collapsed');
  }

  showWelcomeMessage();
  document.getElementById('input').focus();
}

function showWelcomeMessage() {
  addMessage('assistant', "Hi! I'm the Customer Discovery Agent. Tell me about what you're building or a problem you're trying to solve, and I'll help you understand it deeply.");
}

function formatTime(date) {
  var h = date.getHours();
  var m = date.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
}

/* Safe markdown rendering using DOM methods only — no innerHTML */
function renderMarkdownToDOM(text, container) {
  // Split into blocks by double newlines
  var blocks = text.split(/\n\n+/);
  for (var i = 0; i < blocks.length; i++) {
    var block = blocks[i].trim();
    if (!block) continue;

    // Code block: ```...```
    var codeMatch = block.match(/^```(\w*)\n?([\s\S]*?)```$/);
    if (codeMatch) {
      var pre = document.createElement('pre');
      var code = document.createElement('code');
      code.textContent = codeMatch[2].trim();
      pre.appendChild(code);
      container.appendChild(pre);
      continue;
    }

    // Unordered list
    if (/^[-*]\s/.test(block)) {
      var ul = document.createElement('ul');
      var items = block.split(/\n/);
      for (var j = 0; j < items.length; j++) {
        var itemText = items[j].replace(/^[-*]\s+/, '').trim();
        if (itemText) {
          var li = document.createElement('li');
          renderInlineToDOM(itemText, li);
          ul.appendChild(li);
        }
      }
      container.appendChild(ul);
      continue;
    }

    // Ordered list
    if (/^\d+\.\s/.test(block)) {
      var ol = document.createElement('ol');
      var oitems = block.split(/\n/);
      for (var k = 0; k < oitems.length; k++) {
        var oitemText = oitems[k].replace(/^\d+\.\s+/, '').trim();
        if (oitemText) {
          var oli = document.createElement('li');
          renderInlineToDOM(oitemText, oli);
          ol.appendChild(oli);
        }
      }
      container.appendChild(ol);
      continue;
    }

    // Regular paragraph
    var p = document.createElement('p');
    renderInlineToDOM(block, p);
    container.appendChild(p);
  }
}

function renderInlineToDOM(text, parent) {
  // Parse inline elements: **bold**, *italic*, `code`
  var parts = text.split(/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/);
  for (var i = 0; i < parts.length; i++) {
    var part = parts[i];
    if (!part) continue;

    if (part.match(/^\*\*(.+)\*\*$/)) {
      var strong = document.createElement('strong');
      strong.textContent = part.slice(2, -2);
      parent.appendChild(strong);
    } else if (part.match(/^\*(.+)\*$/)) {
      var em = document.createElement('em');
      em.textContent = part.slice(1, -1);
      parent.appendChild(em);
    } else if (part.match(/^`(.+)`$/)) {
      var codeEl = document.createElement('code');
      codeEl.textContent = part.slice(1, -1);
      parent.appendChild(codeEl);
    } else {
      parent.appendChild(document.createTextNode(part));
    }
  }
}

function addMessage(role, text, debugData) {
  var group = document.createElement('div');
  group.className = 'message-group';

  var el = document.createElement('div');
  el.className = 'message ' + role;

  var label = document.createElement('div');
  label.className = 'label';

  var labelText = document.createElement('span');
  labelText.textContent = role === 'user' ? 'You' : 'Bot';
  label.appendChild(labelText);

  var ts = document.createElement('span');
  ts.className = 'timestamp';
  ts.textContent = formatTime(new Date());
  label.appendChild(ts);

  el.appendChild(label);

  var body = document.createElement('div');
  body.className = 'body';
  if (role === 'assistant') {
    renderMarkdownToDOM(text, body);
  } else {
    body.textContent = text;
  }
  el.appendChild(body);

  group.appendChild(el);

  // Add per-message debug section for bot responses
  if (role === 'assistant' && debugData) {
    var dbg = document.createElement('div');
    dbg.className = 'msg-debug' + (debugVisible ? '' : ' hidden');

    var toggle = document.createElement('button');
    toggle.className = 'msg-debug-toggle';
    var tokenInfo = (debugData.input_tokens || 0) + ' in / ' + (debugData.output_tokens || 0) + ' out';
    var latency = (debugData.duration_ms || 0) + 'ms';
    toggle.textContent = '\u25B6 debug \u00b7 ' + tokenInfo + ' \u00b7 ' + latency;
    toggle.onclick = function() {
      var b = dbg.querySelector('.msg-debug-body');
      b.classList.toggle('open');
      toggle.textContent = (b.classList.contains('open') ? '\u25BC' : '\u25B6') +
        ' debug \u00b7 ' + tokenInfo + ' \u00b7 ' + latency;
    };
    dbg.appendChild(toggle);

    var dbgBody = document.createElement('div');
    dbgBody.className = 'msg-debug-body';

    // Personality
    addDebugRow(dbgBody, 'Personality', debugData.personality || '\u2014');

    // Principles
    if (debugData.principles_active && debugData.principles_active.length > 0) {
      var princRow = document.createElement('div');
      princRow.className = 'msg-debug-row';
      var princKey = document.createElement('span');
      princKey.className = 'key';
      princKey.textContent = 'Principles';
      princRow.appendChild(princKey);
      var princVal = document.createElement('span');
      princVal.className = 'val';
      debugData.principles_active.forEach(function(p) {
        var pill = document.createElement('span');
        pill.className = 'debug-pill';
        pill.textContent = p;
        princVal.appendChild(pill);
      });
      princRow.appendChild(princVal);
      dbgBody.appendChild(princRow);
    }

    // Tools called
    if (debugData.tools_called && debugData.tools_called.length > 0) {
      debugData.tools_called.forEach(function(t) {
        var toolRow = document.createElement('div');
        toolRow.style.padding = '4px 0';
        var name = document.createElement('span');
        name.className = 'debug-tool-name';
        name.textContent = t.name;
        toolRow.appendChild(name);
        if (t.arguments && Object.keys(t.arguments).length > 0) {
          var args = document.createElement('span');
          args.className = 'debug-tool-args';
          args.textContent = JSON.stringify(t.arguments);
          toolRow.appendChild(args);
        }
        dbgBody.appendChild(toolRow);
      });
    } else {
      addDebugRow(dbgBody, 'Tools', 'none called');
    }

    // Tokens
    addDebugRow(dbgBody, 'Tokens', tokenInfo);

    // Latency
    addDebugRow(dbgBody, 'Latency', (debugData.duration_ms / 1000).toFixed(1) + 's (' + debugData.duration_ms + 'ms)');

    // Memory count
    addDebugRow(dbgBody, 'Memory', (debugData.memory_count || 0) + ' messages');

    dbg.appendChild(dbgBody);
    group.appendChild(dbg);
  }

  var container = document.getElementById('messages');
  container.appendChild(group);
  container.scrollTop = container.scrollHeight;
}

function addDebugRow(parent, key, val) {
  var row = document.createElement('div');
  row.className = 'msg-debug-row';
  var k = document.createElement('span');
  k.className = 'key';
  k.textContent = key;
  var v = document.createElement('span');
  v.className = 'val';
  v.textContent = val;
  row.appendChild(k);
  row.appendChild(v);
  parent.appendChild(row);
}

function toggleDebug() {
  debugVisible = !debugVisible;
  localStorage.setItem('debugPanelVisible', debugVisible);
  var btn = document.getElementById('debugToggle');
  btn.classList.toggle('active', debugVisible);

  // Toggle sidebar
  var panel = document.getElementById('debugPanel');
  panel.classList.toggle('collapsed', !debugVisible);

  // Toggle per-message debug panels
  var panels = document.querySelectorAll('.msg-debug');
  for (var i = 0; i < panels.length; i++) {
    panels[i].classList.toggle('hidden', !debugVisible);
  }
}

var typingTimer = null;
var typingStartTime = null;

function showTyping() {
  var existing = document.getElementById('typingIndicator');
  if (existing) existing.remove();

  var el = document.createElement('div');
  el.className = 'typing-indicator';
  el.id = 'typingIndicator';

  var dots = document.createElement('div');
  dots.className = 'dots';
  for (var i = 0; i < 3; i++) {
    var dot = document.createElement('div');
    dot.className = 'dot';
    dots.appendChild(dot);
  }
  el.appendChild(dots);

  var txt = document.createElement('span');
  txt.id = 'typingText';
  txt.textContent = 'Thinking...';
  el.appendChild(txt);

  var container = document.getElementById('messages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;

  typingStartTime = Date.now();
  typingTimer = setInterval(function() {
    var elapsed = Math.floor((Date.now() - typingStartTime) / 1000);
    var textEl = document.getElementById('typingText');
    if (!textEl) { clearInterval(typingTimer); return; }
    if (elapsed > 30) {
      textEl.textContent = 'Still thinking \u2014 local models can take a moment... (' + elapsed + 's)';
    } else {
      textEl.textContent = 'Thinking... (' + elapsed + 's)';
    }
  }, 1000);
}

function hideTyping() {
  if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
  typingStartTime = null;
  var el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function sendMessage() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);

  var btn = document.getElementById('sendBtn');
  btn.disabled = true;

  showTyping();

  fetch(API + '/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text, conversation_id: conversationId})
  })
  .then(function(resp) { return resp.json(); })
  .then(function(data) {
    hideTyping();

    if (data.error) {
      addMessage('assistant', 'Error: ' + data.error);
    } else {
      addMessage('assistant', data.response, data);

      // Update sidebar debug panel
      document.getElementById('debugPersonality').textContent = data.personality || '\u2014';

      var princEl = document.getElementById('debugPrinciples');
      while (princEl.firstChild) princEl.removeChild(princEl.firstChild);
      if (data.principles_active && data.principles_active.length > 0) {
        data.principles_active.forEach(function(p) {
          var tag = document.createElement('span');
          tag.className = 'debug-tag';
          tag.textContent = p;
          princEl.appendChild(tag);
        });
      } else {
        princEl.textContent = '\u2014';
      }

      document.getElementById('debugTools').textContent =
        data.tools_called && data.tools_called.length > 0
          ? data.tools_called.map(function(t) { return t.name; }).join(', ')
          : 'none called';
      document.getElementById('debugMemory').textContent = data.memory_count + ' messages';
      document.getElementById('debugTokens').textContent =
        data.input_tokens + ' in / ' + data.output_tokens + ' out';
      document.getElementById('debugLatency').textContent =
        (data.duration_ms / 1000).toFixed(1) + 's (' + data.duration_ms + 'ms)';
    }
  })
  .catch(function(e) {
    hideTyping();
    addMessage('assistant', 'Connection error: ' + e.message);
  })
  .finally(function() {
    btn.disabled = false;
    input.focus();
  });
}

function clearContainer(el) {
  while (el.firstChild) el.removeChild(el.firstChild);
}

function newConversation() {
  fetch(API + '/api/conversations/new', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      conversationId = data.conversation_id;
      clearContainer(document.getElementById('messages'));
      document.getElementById('debugConvId').textContent = conversationId;
      document.getElementById('settingsConvId').textContent = conversationId;
      document.getElementById('debugMemory').textContent = '0 messages';
      document.getElementById('debugTools').textContent = 'none';
      document.getElementById('debugTokens').textContent = '\u2014';
      document.getElementById('debugLatency').textContent = '\u2014';
      showWelcomeMessage();
      document.getElementById('input').focus();
      closeSettings();
    })
    .catch(function() {
      conversationId = 'web-' + Date.now().toString(36);
      clearContainer(document.getElementById('messages'));
      document.getElementById('debugConvId').textContent = conversationId;
      document.getElementById('settingsConvId').textContent = conversationId;
      showWelcomeMessage();
      document.getElementById('input').focus();
      closeSettings();
    });
}

function clearHistory() {
  clearContainer(document.getElementById('messages'));
  closeSettings();
  document.getElementById('input').focus();
}

function openSettings() {
  document.getElementById('settingsConvId').textContent = conversationId;
  document.getElementById('settingsOverlay').classList.add('open');
  document.getElementById('testResult').textContent = '';

  // Load LLM providers and render cards
  fetch(API + '/api/llm/providers')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      llmProviders = data.providers || {};
      selectedProvider = data.active_provider || Object.keys(llmProviders)[0] || '';
      renderProviderCards();
      selectProvider(selectedProvider);
    })
    .catch(function() {});

  // Refresh personalities list
  fetch(API + '/api/personalities')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var sel = document.getElementById('settingsPersonality');
      while (sel.firstChild) sel.removeChild(sel.firstChild);
      (data.personalities || []).forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        sel.appendChild(opt);
      });
      return fetch(API + '/api/config');
    })
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
      document.getElementById('settingsPersonality').value = cfg.personality || '';
    })
    .catch(function() {});

  // Refresh projects list
  fetch(API + '/api/projects')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var sel = document.getElementById('settingsProject');
      while (sel.firstChild) sel.removeChild(sel.firstChild);
      (data.projects || []).forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        sel.appendChild(opt);
      });
      if (data.active_project) {
        sel.value = data.active_project;
      }
    })
    .catch(function() {});
}

function renderProviderCards() {
  var container = document.getElementById('providerCards');
  while (container.firstChild) container.removeChild(container.firstChild);
  Object.keys(llmProviders).forEach(function(pid) {
    var prov = llmProviders[pid];
    var card = document.createElement('div');
    card.className = 'provider-card' + (pid === selectedProvider ? ' selected' : '');
    card.setAttribute('data-provider', pid);
    card.onclick = function() { selectProvider(pid); };

    var icon = document.createElement('div');
    icon.className = 'provider-icon';
    icon.textContent = PROVIDER_ICONS[pid] || '\uD83E\uDD16';
    card.appendChild(icon);

    var label = document.createElement('div');
    label.className = 'provider-label';
    label.textContent = prov.label || pid;
    card.appendChild(label);

    container.appendChild(card);
  });
}

function selectProvider(pid) {
  selectedProvider = pid;
  var prov = llmProviders[pid];
  if (!prov) return;

  // Highlight selected card
  var cards = document.querySelectorAll('.provider-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.toggle('selected', cards[i].getAttribute('data-provider') === pid);
  }

  // Populate model dropdown
  var modelSel = document.getElementById('settingsModel');
  while (modelSel.firstChild) modelSel.removeChild(modelSel.firstChild);
  (prov.model_choices || []).forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    modelSel.appendChild(opt);
  });
  modelSel.value = prov.default_model || '';

  // Set base URL
  document.getElementById('settingsBaseUrl').value = prov.default_base_url || '';

  // Show/hide API key field
  var keyRow = document.getElementById('apiKeyRow');
  if (prov.needs_key) {
    keyRow.classList.add('visible');
  } else {
    keyRow.classList.remove('visible');
  }
  document.getElementById('settingsApiKey').value = '';

  // Load saved config for this provider
  fetch(API + '/api/llm/config?provider_id=' + encodeURIComponent(pid))
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
      if (cfg.base_url) document.getElementById('settingsBaseUrl').value = cfg.base_url;
      if (cfg.model) modelSel.value = cfg.model;
      if (cfg.has_key) document.getElementById('settingsApiKey').placeholder = '\u2022\u2022\u2022\u2022 (saved)';
      else document.getElementById('settingsApiKey').placeholder = 'sk-...';
    })
    .catch(function() {});

  document.getElementById('testResult').textContent = '';
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function applyLLMSettings() {
  var model = document.getElementById('settingsModel').value;
  var baseUrl = document.getElementById('settingsBaseUrl').value.trim();
  var apiKey = document.getElementById('settingsApiKey').value.trim();
  var personality = document.getElementById('settingsPersonality').value;
  var project = document.getElementById('settingsProject').value;

  // Save provider config if key or url changed
  var configPayload = { provider_id: selectedProvider };
  if (baseUrl) configPayload.base_url = baseUrl;
  if (model) configPayload.model = model;
  if (apiKey) configPayload.api_key = apiKey;

  // Save config then switch provider
  fetch(API + '/api/llm/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(configPayload)
  })
  .then(function() {
    return fetch(API + '/api/llm/switch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ provider_id: selectedProvider, model: model })
    });
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) {
      var el = document.getElementById('testResult');
      el.className = 'test-result fail';
      el.textContent = 'Error: ' + data.error;
      return;
    }
    // Update header
    document.getElementById('modelInfo').textContent =
      selectedProvider + ' \u00b7 ' + (data.model || model);
    document.getElementById('statusDot').className = 'status-dot ok';

    // Switch personality if changed
    if (personality) {
      fetch(API + '/api/config', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ personality: personality })
      }).then(function(r) { return r.json(); }).then(function(cfg) {
        document.getElementById('debugPersonality').textContent = cfg.personality || '';
        document.getElementById('modelInfo').textContent =
          selectedProvider + ' \u00b7 ' + (data.model || model) + ' \u00b7 ' + cfg.personality;
      }).catch(function() {});
    }

    // Switch project if changed
    if (project) {
      fetch(API + '/api/projects/switch', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({slug: project})
      }).catch(function() {});
    }

    closeSettings();
  })
  .catch(function(e) {
    var el = document.getElementById('testResult');
    el.className = 'test-result fail';
    el.textContent = 'Failed: ' + e.message;
  });
}

function testConnection() {
  var el = document.getElementById('testResult');
  el.className = 'test-result';
  el.textContent = 'Testing...';

  // Save config first (in case key/url changed), then check health
  var model = document.getElementById('settingsModel').value;
  var baseUrl = document.getElementById('settingsBaseUrl').value.trim();
  var apiKey = document.getElementById('settingsApiKey').value.trim();

  var configPayload = { provider_id: selectedProvider };
  if (baseUrl) configPayload.base_url = baseUrl;
  if (model) configPayload.model = model;
  if (apiKey) configPayload.api_key = apiKey;

  fetch(API + '/api/llm/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(configPayload)
  })
  .then(function() {
    return fetch(API + '/api/health');
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ollama === 'ok') {
      el.className = 'test-result ok';
      el.textContent = '\u2714 Connected to ' + (data.model || 'LLM');
    } else {
      el.className = 'test-result fail';
      el.textContent = '\u2718 LLM unavailable';
    }
  })
  .catch(function(e) {
    el.className = 'test-result fail';
    el.textContent = '\u2718 Connection failed: ' + e.message;
  });
}

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

init();
</script>
